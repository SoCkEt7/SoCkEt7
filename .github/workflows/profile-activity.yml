name: Update Profile Data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Full Technical Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          
          # Base Configuration
          base: header, repositories, metadata
          config_timezone: Europe/Paris

          # Repository Discovery
          repositories_batch: 20
          repositories_affiliations: owner, collaborator, organization_member
          
          # Full Contribution Calendar
          plugin_calendar: yes
          plugin_calendar_limit: 2
          
          # Languages Focus
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: percentage, lines
          plugin_languages_threshold: 1%
          plugin_languages_limit: 0
          plugin_languages_ignored: html, css, tex, Makefile, cmake
          plugin_languages_sections: most-used
          
          # Lines of code
          plugin_lines: yes

  activity:
    needs: metrics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Activity Feed
        uses: jamesgeorge007/github-activity-readme@master
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
        with:
          GH_USERNAME: SoCkEt7
          COMMIT_MSG: "docs: sync activity feed [skip ci]"
          MAX_LINES: 10
