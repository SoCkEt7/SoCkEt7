name: Update Profile Data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Full Technical Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          
          # Base Configuration
          base: header, repositories, metadata
          config_timezone: Europe/Paris
          repositories_batch: 20
          
          # Isometric Calendar (Lighter and prettier than standard)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # LANGUAGES (Icons + Deep Scan + All Repos)
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: percentage, lines
          plugin_languages_threshold: 1%
          plugin_languages_limit: 8
          plugin_languages_sections: most-used, recently-used
          plugin_languages_ignored: html, css, tex, Makefile, cmake
          
          # Tech Stack Icons (via Repo Topics)
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons
          
          # Lines of code
          plugin_lines: yes

  activity:
    needs: metrics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Activity Feed
        uses: jamesgeorge007/github-activity-readme@master
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
        with:
          GH_USERNAME: SoCkEt7
          COMMIT_MSG: "docs: sync activity feed [skip ci]"
          MAX_LINES: 10
