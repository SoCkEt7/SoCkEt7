name: Update Profile Data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Full Technical Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: SoCkEt7
          template: classic
          
          # Focus strictly on Languages and Activity to avoid timeouts
          base: header, activity, community, metadata
          repositories_batch: 10 # Small batches to avoid GraphQL timeouts
          
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, Makefile, cmake
          plugin_languages_details: percentage, lines
          plugin_languages_threshold: 1%
          plugin_languages_limit: 15
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          
          plugin_lines: yes
          plugin_activity: yes
          plugin_activity_limit: 10
          plugin_activity_days: 30
          plugin_activity_filter: all
